<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="lib/style.css">
</head>
<body>
    <div id="board-container"></div> <!-- Game board container -->
    <div id="timer">Time left: 30</div> <!-- Timer display -->
    
    <!-- Audio element for ticking sound effect -->
    <audio id="tickSound" src="sounds/tick_sound.mp3" preload="auto"></audio>
    
    <script src="lib/tic-tac-toe.js"></script>
    <script>
        // Initialize Tic Tac Toe game board
        const board = new Board(3); 
        
        // Function to play tick sound effect
        function playTickSound() {
            const tickSound = document.getElementById('tickSound');
            tickSound.play();
        }

        // Timer countdown logic
        let timeLeft = 30;
        let timerInterval;

        function startTimer() {
            timerInterval = setInterval(() => {
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    // Handle time's up (e.g., end turn)
                    console.log('Time\'s up!');
                } else {
                    document.getElementById('timer').textContent = `Time left: ${timeLeft}`;
                    if (timeLeft <= 5) {
                        playTickSound(); // Play tick sound during last 5 seconds
                    }
                    timeLeft--;
                }
            }, 1000);
        }

        startTimer(); // Start the timer
    </script>
</body>
</html>
